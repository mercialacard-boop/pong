<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pong</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; }
body {
  background: #0a0a0f; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: monospace; color: #fff; user-select: none;
  position: relative; overflow: hidden;
}
#lobby {
  position: fixed; inset: 0; z-index: 100;
  background: #0a0a0f;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 18px; padding: 24px;
}
#lobby h1 { font-size: 24px; font-weight: 500; letter-spacing: 3px; }
#lobby p { font-size: 13px; color: rgba(255,255,255,0.45); text-align: center; max-width: 300px; line-height: 1.8; }
#lobby input {
  background: transparent; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
  padding: 12px 16px; color: #fff; font-family: monospace; font-size: 16px;
  width: 260px; outline: none; text-align: center;
}
#lobby input:focus { border-color: rgba(255,255,255,0.5); }
#joinBtn {
  padding: 12px 40px; background: transparent; border: 1px solid rgba(255,255,255,0.25);
  border-radius: 8px; color: #fff; font-family: monospace; font-size: 15px; cursor: pointer;
}
#joinBtn:active { background: rgba(255,255,255,0.08); }
#waitMsg { font-size: 13px; color: rgba(255,255,255,0.4); text-align: center; line-height: 2; }
#errorMsg { font-size: 12px; color: #E24B4A; text-align: center; max-width: 280px; line-height: 1.6; display: none; }
#retryBtn {
  padding: 10px 28px; background: transparent; border: 1px solid rgba(226,75,74,0.4);
  border-radius: 8px; color: #E24B4A; font-family: monospace; font-size: 13px; cursor: pointer; display: none;
}

#scoreboard {
  display: flex; gap: 48px; font-size: 32px; font-weight: 500;
  margin-bottom: 8px; letter-spacing: 3px;
}
#canvas { border: 1px solid rgba(255,255,255,0.12); border-radius: 4px; display: block; touch-action: none; }
#statusbar { margin-top: 8px; font-size: 12px; color: rgba(255,255,255,0.3); display: flex; gap: 10px; align-items: center; }
#dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.15); flex-shrink: 0; transition: background 0.3s; }
#dot.on { background: #1D9E75; }
#dot.cheat { background: #7F77DD; }

#mobileControls { display: none; width: 100%; flex-direction: column; align-items: center; padding: 10px 16px 0; }
#touchSlider {
  width: 100%; height: 48px; -webkit-appearance: none; appearance: none;
  background: rgba(255,255,255,0.07); border-radius: 24px; outline: none;
}
#touchSlider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 52px; height: 52px;
  border-radius: 50%; background: #7F77DD; border: 2px solid rgba(255,255,255,0.25);
}
#touchSlider.p2::-webkit-slider-thumb { background: #1D9E75; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div id="lobby">
  <h1>PONG</h1>
  <div id="joinSection" style="display:flex;flex-direction:column;align-items:center;gap:14px">
    <p>Raum-Namen eingeben — teile ihn mit deinem Freund.</p>
    <input id="roomInput" placeholder="z.B. arena1" maxlength="32" autocomplete="off" spellcheck="false"/>
    <button id="joinBtn">Beitreten</button>
    <div id="errorMsg"></div>
    <button id="retryBtn">Nochmal versuchen</button>
  </div>
  <div id="waitSection" class="hidden" style="display:flex;flex-direction:column;align-items:center;gap:14px">
    <div id="waitMsg">Verbinde mit Server…</div>
  </div>
</div>

<div id="scoreboard">
  <span id="s1">0</span>
  <span style="color:rgba(255,255,255,0.15)">:</span>
  <span id="s2">0</span>
</div>

<div style="position:relative;display:inline-block;line-height:0;">
  <canvas id="canvas" width="560" height="360"></canvas>
  <div id="zone-tl" style="position:absolute;top:0;left:0;width:70px;height:70px;z-index:5;"></div>
  <div id="zone-br" style="position:absolute;bottom:0;right:0;width:70px;height:70px;z-index:5;"></div>
</div>

<div id="mobileControls">
  <input type="range" id="touchSlider" min="0" max="290" value="145"/>
</div>

<div id="statusbar">
  <div id="dot"></div>
  <span id="statusLabel">nicht verbunden</span>
</div>

<script>
const SERVER_URL = "wss://pong-1-u1eg.onrender.com";
const W = 560, H = 360, PAD = 12, PW = 10, PH = 70, BALL = 9;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 640;

function resize() {
  const maxW = Math.min(window.innerWidth - 16, W);
  const maxH = isMobile ? window.innerHeight * 0.48 : window.innerHeight - 140;
  const s = Math.min(maxW / W, maxH / H);
  canvas.style.width = Math.floor(W * s) + 'px';
  canvas.style.height = Math.floor(H * s) + 'px';
  if (isMobile) {
    const mc = document.getElementById('mobileControls');
    mc.style.display = 'flex';
    mc.style.maxWidth = Math.floor(W * s) + 'px';
    document.getElementById('scoreboard').style.cssText =
      'display:flex;gap:28px;font-size:22px;font-weight:500;margin-bottom:6px;letter-spacing:3px;';
  }
}
resize();
window.addEventListener('resize', resize);

let ws = null, myPlayer = 0, animId = null;
let p1y = H/2-PH/2, p2y = H/2-PH/2, bx = W/2, by = H/2;
let score = [0, 0];
let cheatMode = false, cheatY = H/2-PH/2, cheatJT = 0, cheatJO = 0;

const $ = id => document.getElementById(id);

function setStatus(label, cls) {
  $('statusLabel').textContent = label;
  $('dot').className = cls || '';
}
function updateScore() {
  $('s1').textContent = score[0];
  $('s2').textContent = score[1];
}
function hideLobby() { $('lobby').classList.add('hidden'); }
function send(obj) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); }

function showError(msg) {
  $('errorMsg').textContent = msg;
  $('errorMsg').style.display = 'block';
  $('retryBtn').style.display = 'block';
  $('waitSection').classList.add('hidden');
  $('joinSection').classList.remove('hidden');
  $('joinSection').querySelector('p').style.display = 'none';
}

function connectToRoom(room) {
  $('waitMsg').textContent = 'Verbinde mit Server…';
  setStatus('verbinde…', '');

  const timeout = setTimeout(() => {
    ws && ws.close();
    showError('Server antwortet nicht. Er schläft möglicherweise — warte 30 Sekunden und versuche es nochmal.');
  }, 12000);

  try { ws = new WebSocket(SERVER_URL); } catch(e) { clearTimeout(timeout); showError('Verbindung fehlgeschlagen.'); return; }

  ws.onopen = () => {
    clearTimeout(timeout);
    setStatus('verbunden', 'on');
    send({ type: 'join', room });
  };
  ws.onmessage = e => handleMsg(JSON.parse(e.data));
  ws.onerror = () => { clearTimeout(timeout); };
  ws.onclose = (ev) => {
    clearTimeout(timeout);
    if (myPlayer === 0) {
      showError('Verbindung getrennt (Code ' + ev.code + '). Server möglicherweise nicht erreichbar.');
    } else {
      setStatus('getrennt — seite neu laden', '');
    }
  };
}

function handleMsg(msg) {
  if (msg.type === 'assigned') {
    myPlayer = msg.player;
    if (msg.state) { p1y = msg.state.p1y; p2y = msg.state.p2y; score = msg.state.score; updateScore(); }
    if (myPlayer === 1) {
      $('waitMsg').innerHTML = 'Du bist Spieler 1 (lila)<br>Warte auf Spieler 2…';
      setStatus('spieler 1 — warte', 'on');
    } else if (myPlayer === 2) {
      hideLobby();
      setStatus('spieler 2', 'on');
      $('touchSlider').classList.add('p2');
      if (!animId) animId = requestAnimationFrame(loop);
    } else {
      $('waitMsg').textContent = 'Raum voll — nur zuschauen';
    }
  }
  if (msg.type === 'playerCount') {
    if (msg.count >= 2 && myPlayer === 1) { hideLobby(); setStatus('spieler 1', 'on'); }
    if (msg.count < 2 && myPlayer !== 0) setStatus('gegner getrennt', 'on');
  }
  if (msg.type === 'start') {
    score = [0,0]; updateScore();
    if (!animId) animId = requestAnimationFrame(loop);
  }
  if (msg.type === 'tick') {
    bx = msg.bx; by = msg.by;
    if (!cheatMode || myPlayer === 0) {
      if (myPlayer !== 1) p1y = msg.p1y;
      if (myPlayer !== 2) p2y = msg.p2y;
    }
    if (myPlayer === 1 && !cheatMode) p2y = msg.p2y;
    if (myPlayer === 2 && !cheatMode) p1y = msg.p1y;
    score = msg.score;
    if (msg.scored) updateScore();
  }
}

function cheatTick() {
  cheatJT++;
  if (cheatJT % 7 === 0) cheatJO = (Math.random()-0.5) * 7;
  const target = by - PH/2 + cheatJO;
  const diff = target - cheatY;
  cheatY += Math.sign(diff) * Math.min(Math.abs(diff), 5.5);
  cheatY = Math.max(0, Math.min(H-PH, cheatY));
  if (myPlayer === 1) { p1y = cheatY; send({ type:'move', player:1, y:p1y }); }
  if (myPlayer === 2) { p2y = cheatY; send({ type:'move', player:2, y:p2y }); }
  $('touchSlider').value = Math.round(cheatY);
}

function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0,0,W,H);
  ctx.setLineDash([6,8]); ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle = '#7F77DD'; ctx.beginPath(); ctx.roundRect(PAD,p1y,PW,PH,3); ctx.fill();
  ctx.fillStyle = '#1D9E75'; ctx.beginPath(); ctx.roundRect(W-PAD-PW,p2y,PW,PH,3); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(bx,by,BALL,0,Math.PI*2); ctx.fill();
}

function loop() { if (cheatMode) cheatTick(); draw(); animId = requestAnimationFrame(loop); }

canvas.addEventListener('mousemove', e => {
  if (cheatMode || myPlayer === 0) return;
  const r = canvas.getBoundingClientRect();
  const ny = Math.max(0, Math.min(H-PH, (e.clientY-r.top)*(H/r.height)-PH/2));
  if (myPlayer === 1) { p1y = ny; send({ type:'move', player:1, y:ny }); }
  if (myPlayer === 2) { p2y = ny; send({ type:'move', player:2, y:ny }); }
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (cheatMode || myPlayer === 0) return;
  const r = canvas.getBoundingClientRect();
  const ny = Math.max(0, Math.min(H-PH, (e.touches[0].clientY-r.top)*(H/r.height)-PH/2));
  if (myPlayer === 1) { p1y = ny; send({ type:'move', player:1, y:ny }); }
  if (myPlayer === 2) { p2y = ny; send({ type:'move', player:2, y:ny }); }
}, { passive: false });

$('touchSlider').addEventListener('input', e => {
  if (cheatMode || myPlayer === 0) return;
  const ny = parseInt(e.target.value);
  if (myPlayer === 1) { p1y = ny; send({ type:'move', player:1, y:ny }); }
  if (myPlayer === 2) { p2y = ny; send({ type:'move', player:2, y:ny }); }
});

function toggleCheat() {
  if (myPlayer === 0) return;
  cheatMode = !cheatMode;
  cheatY = myPlayer === 1 ? p1y : p2y;
  $('dot').className = cheatMode ? 'cheat' : 'on';
  $('statusLabel').textContent = cheatMode ? 'ki-übernahme aktiv' : 'spieler ' + myPlayer;
}

// Unsichtbare Touch-Ecken: gleichzeitig oben-links + unten-rechts antippen
let tlDown = false, brDown = false;
$('zone-tl').addEventListener('touchstart', e => { e.preventDefault(); tlDown = true; if (brDown) toggleCheat(); }, { passive: false });
$('zone-tl').addEventListener('touchend', () => tlDown = false);
$('zone-br').addEventListener('touchstart', e => { e.preventDefault(); brDown = true; if (tlDown) toggleCheat(); }, { passive: false });
$('zone-br').addEventListener('touchend', () => brDown = false);

// Tab versteckt → Cheat aus
document.addEventListener('visibilitychange', () => {
  if (document.hidden && cheatMode) toggleCheat();
});

document.addEventListener('keydown', e => {
  if (e.key === 'c' || e.key === 'C') toggleCheat();
});

$('joinBtn').addEventListener('click', () => {
  const room = $('roomInput').value.trim();
  if (!room) return;
  $('errorMsg').style.display = 'none';
  $('retryBtn').style.display = 'none';
  $('joinSection').classList.add('hidden');
  $('waitSection').classList.remove('hidden');
  connectToRoom(room);
});

$('retryBtn').addEventListener('click', () => {
  $('errorMsg').style.display = 'none';
  $('retryBtn').style.display = 'none';
  $('joinSection').querySelector('p').style.display = '';
  $('joinSection').classList.remove('hidden');
});

$('roomInput').addEventListener('keydown', e => { if (e.key === 'Enter') $('joinBtn').click(); });

draw();
</script>
</body>
</html>
